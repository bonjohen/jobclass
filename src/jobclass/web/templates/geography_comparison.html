<section class="geography-comparison-page" data-soc-code="{{ soc_code }}">
    <h1 id="page-title">Geography Comparison</h1>
    <p><a href="/occupation/{{ soc_code }}">&laquo; Back to profile</a> | <a href="/trends">&laquo; Trends</a></p>

    <div class="geo-controls">
        <label for="geo-metric">Metric:</label>
        <select id="geo-metric">
            <option value="employment_count">Employment Count</option>
            <option value="mean_annual_wage" selected>Mean Annual Wage</option>
            <option value="median_annual_wage">Median Annual Wage</option>
        </select>
    </div>

    <div id="geo-chart-container" class="loading" role="region" aria-live="polite" aria-busy="true">
        Loading geography data...
    </div>

    <div id="geo-table-container" hidden></div>
</section>

<script src="/static/js/geography_comparison.js"></script>
