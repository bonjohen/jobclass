<section class="search-page">
    <h1>Search Occupations</h1>
    <p>Find occupations by keyword, SOC code, or title.</p>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="e.g. Software, 15-1252, Manager..."
               aria-label="Search occupations" autocomplete="search">
    </div>

    <div id="search-results" class="search-results" role="region" aria-live="polite">
        <p class="search-hint">Type at least 2 characters to search.</p>
    </div>
</section>

<script src="/static/js/search.js"></script>
