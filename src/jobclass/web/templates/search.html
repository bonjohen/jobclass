<section class="search-page">
    <h1>Search Occupations</h1>
    <p>Find occupations by keyword, SOC code, or title.</p>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="e.g. Software, 15-1252, Manager..."
               aria-label="Search occupations" autocomplete="off">
    </div>

    <div id="search-results" class="search-results" role="region" aria-live="polite">
        <p class="search-hint">Type at least 2 characters to search.</p>
    </div>
</section>

<script>
(function() {
    const input = document.getElementById("search-input");
    const resultsDiv = document.getElementById("search-results");
    let debounceTimer = null;

    input.addEventListener("input", function() {
        clearTimeout(debounceTimer);
        const q = input.value.trim();
        if (q.length < 2) {
            resultsDiv.innerHTML = '<p class="search-hint">Type at least 2 characters to search.</p>';
            return;
        }
        debounceTimer = setTimeout(function() { doSearch(q); }, 250);
    });

    function doSearch(q) {
        fetch("/api/occupations/search?q=" + encodeURIComponent(q))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.results || data.results.length === 0) {
                    resultsDiv.innerHTML = '<p class="search-hint">No occupations found.</p>';
                    return;
                }
                var html = '<table class="data-table"><thead><tr><th>SOC Code</th><th>Title</th><th>Level</th></tr></thead><tbody>';
                data.results.forEach(function(r) {
                    html += '<tr><td><a href="/occupation/' + r.soc_code + '">' + r.soc_code + '</a></td>';
                    html += '<td><a href="/occupation/' + r.soc_code + '">' + escapeHtml(r.occupation_title) + '</a></td>';
                    html += '<td>' + escapeHtml(r.occupation_level_name) + '</td></tr>';
                });
                html += '</tbody></table>';
                resultsDiv.innerHTML = html;
            })
            .catch(function() {
                resultsDiv.innerHTML = '<p class="search-hint">Search failed. Please try again.</p>';
            });
    }

    function escapeHtml(text) {
        var div = document.createElement("div");
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    input.focus();
})();
</script>
