<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Labor market occupation data — employment, wages, skills, tasks, and projections from federal sources.">
    <title>{{ page_title | default("JobClass — Labor Market Reporting") }}</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <header>
        <nav aria-label="Main navigation">
            <div class="nav-brand">
                <a href="/">JobClass</a>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/search">Search</a></li>
                <li><a href="/hierarchy">Hierarchy</a></li>
                <li><a href="/methodology">Methodology</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}
        {% if content_template is defined %}
            {% include content_template %}
        {% endif %}
        {% endblock %}
    </main>

    <footer>
        <div class="footer-content">
            <p>JobClass — Labor Market Occupation Pipeline</p>
            <p class="footer-meta">Data sourced from BLS (SOC, OEWS, Employment Projections) and O*NET</p>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
