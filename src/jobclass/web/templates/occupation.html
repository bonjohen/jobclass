<section class="occupation-page" id="occupation-page" data-soc-code="{{ soc_code }}">
    <div class="loading" id="profile-loading">Loading occupation data...</div>
    <div id="profile-content" style="display:none;">
        <!-- Breadcrumb -->
        <nav class="breadcrumb" id="breadcrumb" aria-label="Hierarchy breadcrumb"></nav>

        <!-- Header -->
        <div class="occupation-header">
            <h1 id="occ-title"></h1>
            <div class="occupation-meta">
                <span class="lineage-badge" id="occ-soc-code"></span>
                <span class="lineage-badge" id="occ-soc-version"></span>
            </div>
        </div>

        <!-- Definition -->
        <div class="occupation-section" id="definition-section">
            <h2>Definition</h2>
            <p id="occ-definition"></p>
        </div>

        <!-- Hierarchy context -->
        <div class="occupation-section" id="hierarchy-context">
            <h2>Hierarchy</h2>
            <div class="context-grid">
                <div id="siblings-section" style="display:none;">
                    <h3>Related Occupations</h3>
                    <ul id="siblings-list" class="occ-link-list"></ul>
                </div>
                <div id="children-section" style="display:none;">
                    <h3>Specializations</h3>
                    <ul id="children-list" class="occ-link-list"></ul>
                </div>
            </div>
        </div>

        <!-- Wages section (populated by W3) -->
        <div class="occupation-section" id="wages-section" style="display:none;">
            <h2>Employment &amp; Wages</h2>
            <div id="wages-content"></div>
        </div>

        <!-- Skills section (populated by W4) -->
        <div class="occupation-section" id="skills-section" style="display:none;">
            <h2>Skills</h2>
            <div id="skills-content"></div>
        </div>

        <!-- Tasks section (populated by W4) -->
        <div class="occupation-section" id="tasks-section" style="display:none;">
            <h2>Tasks</h2>
            <div id="tasks-content"></div>
        </div>

        <!-- Projections section (populated by W5) -->
        <div class="occupation-section" id="projections-section" style="display:none;">
            <h2>Employment Projections</h2>
            <div id="projections-content"></div>
        </div>

        <!-- Similar occupations (populated by W4) -->
        <div class="occupation-section" id="similar-section" style="display:none;">
            <h2>Similar Occupations</h2>
            <div id="similar-content"></div>
        </div>
    </div>
</section>

<script>
(function() {
    var socCode = document.getElementById("occupation-page").dataset.socCode;
    var loading = document.getElementById("profile-loading");
    var content = document.getElementById("profile-content");

    fetch("/api/occupations/" + encodeURIComponent(socCode))
        .then(function(r) {
            if (!r.ok) throw new Error("Not found");
            return r.json();
        })
        .then(function(data) {
            loading.style.display = "none";
            content.style.display = "block";

            // Title and meta
            document.getElementById("occ-title").textContent = data.occupation_title;
            document.getElementById("occ-soc-code").textContent = data.soc_code;
            document.getElementById("occ-soc-version").textContent = "SOC " + data.soc_version;
            document.title = data.occupation_title + " (" + data.soc_code + ") — JobClass";

            // Definition
            if (data.occupation_definition) {
                document.getElementById("occ-definition").textContent = data.occupation_definition;
            } else {
                document.getElementById("definition-section").style.display = "none";
            }

            // Breadcrumb
            if (data.breadcrumb && data.breadcrumb.length > 0) {
                var bc = document.getElementById("breadcrumb");
                var html = "";
                data.breadcrumb.forEach(function(item, i) {
                    if (i > 0) html += ' <span class="bc-sep">&rsaquo;</span> ';
                    if (item.soc_code === socCode) {
                        html += '<span class="bc-current">' + escapeHtml(item.occupation_title) + '</span>';
                    } else {
                        html += '<a href="/occupation/' + item.soc_code + '">' + escapeHtml(item.occupation_title) + '</a>';
                    }
                });
                bc.innerHTML = html;
            }

            // Siblings
            if (data.siblings && data.siblings.length > 0) {
                document.getElementById("siblings-section").style.display = "block";
                var sl = document.getElementById("siblings-list");
                sl.innerHTML = data.siblings.map(function(s) {
                    return '<li><a href="/occupation/' + s.soc_code + '">' + s.soc_code + ' — ' + escapeHtml(s.occupation_title) + '</a></li>';
                }).join("");
            }

            // Children
            if (data.children && data.children.length > 0) {
                document.getElementById("children-section").style.display = "block";
                var cl = document.getElementById("children-list");
                cl.innerHTML = data.children.map(function(c) {
                    return '<li><a href="/occupation/' + c.soc_code + '">' + c.soc_code + ' — ' + escapeHtml(c.occupation_title) + '</a></li>';
                }).join("");
            }
        })
        .catch(function() {
            loading.innerHTML = '<p>Occupation not found.</p><p><a href="/search">Return to Search</a></p>';
        });

    function escapeHtml(text) {
        var div = document.createElement("div");
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }
})();
</script>
