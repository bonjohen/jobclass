<section class="occupation-page" id="occupation-page" data-soc-code="{{ soc_code }}">
    <div class="loading" id="profile-loading">Loading occupation data...</div>
    <div id="profile-content" style="display:none;">
        <!-- Breadcrumb -->
        <nav class="breadcrumb" id="breadcrumb" aria-label="Hierarchy breadcrumb"></nav>

        <!-- Header -->
        <div class="occupation-header">
            <h1 id="occ-title"></h1>
            <div class="occupation-meta">
                <span class="lineage-badge" id="occ-soc-code"></span>
                <span class="lineage-badge" id="occ-soc-version"></span>
            </div>
        </div>

        <!-- Definition -->
        <div class="occupation-section" id="definition-section">
            <h2>Definition</h2>
            <p id="occ-definition"></p>
        </div>

        <!-- Hierarchy context -->
        <div class="occupation-section" id="hierarchy-context">
            <h2>Hierarchy</h2>
            <div class="context-grid">
                <div id="siblings-section" style="display:none;">
                    <h3>Related Occupations</h3>
                    <ul id="siblings-list" class="occ-link-list"></ul>
                </div>
                <div id="children-section" style="display:none;">
                    <h3>Specializations</h3>
                    <ul id="children-list" class="occ-link-list"></ul>
                </div>
            </div>
        </div>

        <!-- Wages section (populated by W3) -->
        <div class="occupation-section" id="wages-section" role="region" aria-live="polite" aria-busy="true" style="display:none;">
            <h2>Employment &amp; Wages</h2>
            <div id="wages-content"></div>
        </div>

        <!-- Skills section (populated by W4) -->
        <div class="occupation-section" id="skills-section" role="region" aria-live="polite" aria-busy="true" style="display:none;">
            <h2>Skills</h2>
            <div id="skills-content"></div>
        </div>

        <!-- Tasks section (populated by W4) -->
        <div class="occupation-section" id="tasks-section" role="region" aria-live="polite" aria-busy="true" style="display:none;">
            <h2>Tasks</h2>
            <div id="tasks-content"></div>
        </div>

        <!-- Projections section (populated by W5) -->
        <div class="occupation-section" id="projections-section" role="region" aria-live="polite" aria-busy="true" style="display:none;">
            <h2>Employment Projections</h2>
            <div id="projections-content"></div>
        </div>

        <!-- Similar occupations (populated by W4) -->
        <div class="occupation-section" id="similar-section" role="region" aria-live="polite" aria-busy="true" style="display:none;">
            <h2>Similar Occupations</h2>
            <div id="similar-content"></div>
        </div>
    </div>
</section>

<script src="/static/js/occupation.js"></script>
