<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pipeline Mockup — Validation Gates (validate)</title>
<style>
  body {
    margin: 0; background: #0f172a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e2e8f0;
  }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 2px; color: #f1f5f9; }
  .subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
  .back { position: fixed; top: 16px; left: 16px; color: #ef4444; text-decoration: none; font-size: 13px; }
  .back:hover { text-decoration: underline; }
  .legend { display: flex; gap: 20px; margin-top: 20px; font-size: 11px; color: #94a3b8; }
  .legend-item { display: flex; align-items: center; gap: 6px; }

  .node:hover { filter: brightness(1.15); }
</style>

<body>
<a class="back" href="00_summary_topology.html">&larr; Summary Topology</a>
<h1>Validation Gates — Drill-In View</h1>
<p class="subtitle">6 gate nodes &middot; 1 lane (Validation Gates) &middot; Accent: <span style="color:#ef4444">#ef4444</span></p>

<svg width="900" height="480" viewBox="0 0 900 480">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-cond" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-blocked" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-ghost" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#475569"/>
    </marker>
  </defs>

  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="480" fill="url(#grid)" rx="12"/>

  <!-- Lane background -->
  <rect x="80" y="35" width="740" height="390" rx="8" fill="#ef444408" stroke="#ef444425" stroke-width="1"/>
  <text x="450" y="63" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444" opacity="0.7">Validation Gates — Sequential Fail-Fast Chain</text>

  <!-- Ghost incoming from Parsers -->
  <text x="25" y="55" font-size="10" fill="#475569" font-style="italic">&larr; from Parsers</text>
  <line x1="20" y1="130" x2="100" y2="130" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>
  <text x="25" y="160" font-size="8" fill="#475569">7 parsers feed in</text>

  <!-- Ghost outgoing to Core Warehouse -->
  <text x="875" y="55" text-anchor="end" font-size="10" fill="#475569" font-style="italic">to Core &rarr;</text>
  <line x1="780" y1="330" x2="880" y2="200" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>
  <text x="875" y="215" text-anchor="end" font-size="8" fill="#475569">8 core tables</text>

  <!-- ══════════════════════════════════ -->
  <!-- EDGES (internal chain)             -->
  <!-- ══════════════════════════════════ -->

  <!-- Schema Drift → Referential (conditional: schema valid) -->
  <line x1="195" y1="160" x2="300" y2="160" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrow-cond)"/>
  <rect x="210" y="140" width="75" height="14" rx="7" fill="#0f172a" stroke="#f59e0b" stroke-width="0.7"/>
  <text x="248" y="151" text-anchor="middle" font-size="8" fill="#f59e0b">schema valid</text>

  <!-- Schema Drift → Grain (blocked: drift blocks) -->
  <path d="M 165 220 Q 300 280, 480 220" fill="none" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrow-blocked)"/>
  <rect x="250" y="270" width="130" height="14" rx="7" fill="#0f172a" stroke="#ef4444" stroke-width="0.7"/>
  <text x="315" y="281" text-anchor="middle" font-size="8" fill="#ef4444">drift blocks publication</text>

  <!-- Referential → Grain -->
  <line x1="415" y1="160" x2="420" y2="160" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Grain → Null Semantics -->
  <line x1="535" y1="160" x2="535" y2="270" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Null Semantics → Temporal -->
  <line x1="535" y1="335" x2="385" y2="335" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Temporal → SOC Alignment -->
  <line x1="265" y1="335" x2="165" y2="335" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- SOC Alignment → out (conditional) -->
  <line x1="165" y1="365" x2="780" y2="365" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="780" y1="365" x2="780" y2="335" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-cond)"/>
  <rect x="420" y="371" width="90" height="14" rx="7" fill="#0f172a" stroke="#f59e0b" stroke-width="0.7"/>
  <text x="465" y="382" text-anchor="middle" font-size="8" fill="#f59e0b">SOC loads first</text>

  <!-- ══════════════════════════════════ -->
  <!-- GATE NODES (diamonds)              -->
  <!-- ══════════════════════════════════ -->

  <!-- Schema Drift Detection -->
  <g class="node" transform="translate(105, 90)">
    <polygon points="60,0 120,65 60,130 0,65" fill="#1e293b" stroke="#ef4444" stroke-width="1.8"/>
    <text x="60" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Schema Drift</text>
    <text x="60" y="73" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Detection</text>
  </g>

  <!-- Referential Integrity -->
  <g class="node" transform="translate(300, 95)">
    <polygon points="60,0 120,65 60,130 0,65" fill="#1e293b" stroke="#ef4444" stroke-width="1.8"/>
    <text x="60" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Referential</text>
    <text x="60" y="73" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Integrity</text>
  </g>

  <!-- Grain Uniqueness -->
  <g class="node" transform="translate(420, 95)">
    <polygon points="60,0 120,65 60,130 0,65" fill="#1e293b" stroke="#ef4444" stroke-width="1.8"/>
    <text x="60" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Grain</text>
    <text x="60" y="73" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Uniqueness</text>
  </g>

  <!-- Null Semantics Preservation -->
  <g class="node" transform="translate(475, 270)">
    <polygon points="60,0 120,65 60,130 0,65" fill="#1e293b" stroke="#ef4444" stroke-width="1.8"/>
    <text x="60" y="55" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Null</text>
    <text x="60" y="70" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Semantics</text>
    <text x="60" y="85" text-anchor="middle" font-size="9" fill="#94a3b8">Preservation</text>
  </g>

  <!-- Temporal Consistency -->
  <g class="node" transform="translate(265, 270)">
    <polygon points="60,0 120,65 60,130 0,65" fill="#1e293b" stroke="#ef4444" stroke-width="1.8"/>
    <text x="60" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Temporal</text>
    <text x="60" y="73" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Consistency</text>
  </g>

  <!-- SOC Alignment -->
  <g class="node" transform="translate(105, 270)">
    <polygon points="60,0 120,65 60,130 0,65" fill="#1e293b" stroke="#ef4444" stroke-width="1.8"/>
    <text x="60" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">SOC</text>
    <text x="60" y="73" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Alignment</text>
  </g>

  <!-- Final output node indicator -->
  <g transform="translate(720, 290)">
    <rect width="70" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="35" y="22" text-anchor="middle" font-size="9" fill="#475569">All gates</text>
    <text x="35" y="35" text-anchor="middle" font-size="9" fill="#475569">passed</text>
    <text x="35" y="46" text-anchor="middle" font-size="8" fill="#3b82f6">&rarr; Core</text>
  </g>

  <text x="450" y="455" text-anchor="middle" font-size="11" fill="#475569">
    6 gate nodes (diamonds) &middot; Sequential chain with blocked-path branch &middot; All must pass before Core loading
  </text>
</svg>

<div class="legend">
  <div class="legend-item">
    <svg width="20" height="20"><polygon points="10,0 20,10 10,20 0,10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/></svg>
    <span>Gate (diamond)</span>
  </div>
  <div class="legend-item">
    <svg width="32" height="10"><line x1="0" y1="5" x2="32" y2="5" stroke="#94a3b8" stroke-width="1.5"/></svg>
    <span>Required</span>
  </div>
  <div class="legend-item">
    <svg width="32" height="10"><line x1="0" y1="5" x2="32" y2="5" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/></svg>
    <span>Conditional</span>
  </div>
  <div class="legend-item">
    <svg width="32" height="10"><line x1="0" y1="5" x2="32" y2="5" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/></svg>
    <span>Blocked path</span>
  </div>
</div>
</body>
