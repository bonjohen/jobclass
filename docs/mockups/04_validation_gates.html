<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pipeline Mockup — Validation Gates (validate)</title>
<style>
  body {
    margin: 0; background: #0f172a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e2e8f0;
  }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 2px; color: #f1f5f9; }
  .subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
  .back { position: fixed; top: 16px; left: 16px; color: #ef4444; text-decoration: none; font-size: 13px; }
  .back:hover { text-decoration: underline; }
  .legend { display: flex; gap: 20px; margin-top: 20px; font-size: 11px; color: #94a3b8; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .node { cursor: pointer; transition: filter 0.2s; }
  .node:hover { filter: brightness(1.15); }
</style>
</head>
<body>
<a class="back" href="00_summary_topology.html">&larr; Summary Topology</a>
<h1>Validation Gates — Drill-In View</h1>
<p class="subtitle">6 gate nodes &middot; 1 lane (Validation Gates) &middot; Accent: <span style="color:#ef4444">#ef4444</span></p>

<!--
  Layout: Z-pattern with 6 diamond gates
  Row 1 (L→R): Schema Drift → Referential → Grain
  Row 2 (R→L): Null Semantics → Temporal → SOC Alignment
  Connection: Grain ↓ Null Semantics (vertical drop)
  Output: SOC bottom → floor channel → right exit to Core

  Diamond: 120w × 130h, local center at (60,65)
  Row 1 centers at y=155, Row 2 centers at y=345
  Column centers: x=190, x=400, x=610 (210px spacing)

  Node tips (L/R/T/B from translate origin):
    Schema  translate(130, 90):  L(130,155) R(250,155) T(190, 90) B(190,220)
    Refint  translate(340, 90):  L(340,155) R(460,155) T(400, 90) B(400,220)
    Grain   translate(550, 90):  L(550,155) R(670,155) T(610, 90) B(610,220)
    NullSem translate(550,280):  L(550,345) R(670,345) T(610,280) B(610,410)
    Tempor  translate(340,280):  L(340,345) R(460,345) T(400,280) B(400,410)
    SOC     translate(130,280):  L(130,345) R(250,345) T(190,280) B(190,410)
-->

<svg width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-cond" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-blocked" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-ghost" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Grid background -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="500" fill="url(#grid)" rx="12"/>

  <!-- Lane background -->
  <rect x="55" y="40" width="790" height="410" rx="8" fill="#ef444408" stroke="#ef444425" stroke-width="1"/>
  <text x="450" y="65" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444" opacity="0.7">Validation Gates — Sequential Fail-Fast Chain</text>

  <!-- ══════════════════════════════════ -->
  <!-- GHOST INCOMING (from Parsers)      -->
  <!-- ══════════════════════════════════ -->
  <text x="95" y="140" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">&larr; from Parsers</text>
  <line x1="65" y1="155" x2="130" y2="155" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>
  <text x="95" y="172" text-anchor="middle" font-size="8" fill="#475569">7 parsers feed in</text>

  <!-- ══════════════════════════════════ -->
  <!-- EDGES — Row 1 (L→R)               -->
  <!-- ══════════════════════════════════ -->

  <!-- Schema Drift R(250,155) → Referential L(340,155) — conditional -->
  <line x1="250" y1="155" x2="340" y2="155" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrow-cond)"/>
  <rect x="248" y="143" width="90" height="16" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="0.7"/>
  <text x="293" y="154" text-anchor="middle" font-size="8" fill="#f59e0b">schema valid</text>

  <!-- Referential R(460,155) → Grain L(550,155) — normal -->
  <line x1="460" y1="155" x2="550" y2="155" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════ -->
  <!-- EDGE — Row connector (vertical)    -->
  <!-- ══════════════════════════════════ -->

  <!-- Grain B(610,220) → Null Semantics T(610,280) — normal -->
  <line x1="610" y1="220" x2="610" y2="280" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════ -->
  <!-- EDGES — Row 2 (R→L)               -->
  <!-- ══════════════════════════════════ -->

  <!-- Null Semantics L(550,345) → Temporal R(460,345) — normal -->
  <line x1="550" y1="345" x2="460" y2="345" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Temporal L(340,345) → SOC Alignment R(250,345) — normal -->
  <line x1="340" y1="345" x2="250" y2="345" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════ -->
  <!-- BLOCKED PATH (Schema Drift fail)   -->
  <!-- ══════════════════════════════════ -->

  <!-- Schema B(190,220) → blocked indicator in gap between rows -->
  <line x1="190" y1="220" x2="230" y2="240" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="215" y="236" width="120" height="20" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="275" y="250" text-anchor="middle" font-size="8" fill="#ef4444">&#x2715; blocks publication</text>

  <!-- ══════════════════════════════════ -->
  <!-- OUTPUT PATH (SOC → Core)           -->
  <!-- ══════════════════════════════════ -->

  <!-- SOC B(190,410) → floor channel → right exit -->
  <path d="M 190 410 L 190 435 L 870 435" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-cond)"/>
  <rect x="430" y="424" width="80" height="16" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="0.7"/>
  <text x="470" y="435" text-anchor="middle" font-size="8" fill="#f59e0b">all 6 pass</text>
  <text x="800" y="428" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">to Core Warehouse &rarr;</text>

  <!-- ══════════════════════════════════ -->
  <!-- GATE NODES (diamonds)              -->
  <!-- ══════════════════════════════════ -->

  <!-- 1. Schema Drift Detection — translate(130, 90) -->
  <g class="node" transform="translate(130, 90)">
    <polygon points="60,0 120,65 60,130 0,65" fill="#1e293b" stroke="#ef4444" stroke-width="1.8"/>
    <text x="60" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Schema Drift</text>
    <text x="60" y="73" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Detection</text>
  </g>

  <!-- 2. Referential Integrity — translate(340, 90) -->
  <g class="node" transform="translate(340, 90)">
    <polygon points="60,0 120,65 60,130 0,65" fill="#1e293b" stroke="#ef4444" stroke-width="1.8"/>
    <text x="60" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Referential</text>
    <text x="60" y="73" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Integrity</text>
  </g>

  <!-- 3. Grain Uniqueness — translate(550, 90) -->
  <g class="node" transform="translate(550, 90)">
    <polygon points="60,0 120,65 60,130 0,65" fill="#1e293b" stroke="#ef4444" stroke-width="1.8"/>
    <text x="60" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Grain</text>
    <text x="60" y="73" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Uniqueness</text>
  </g>

  <!-- 4. Null Semantics Preservation — translate(550, 280) -->
  <g class="node" transform="translate(550, 280)">
    <polygon points="60,0 120,65 60,130 0,65" fill="#1e293b" stroke="#ef4444" stroke-width="1.8"/>
    <text x="60" y="55" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Null</text>
    <text x="60" y="70" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Semantics</text>
    <text x="60" y="84" text-anchor="middle" font-size="9" fill="#94a3b8">Preservation</text>
  </g>

  <!-- 5. Temporal Consistency — translate(340, 280) -->
  <g class="node" transform="translate(340, 280)">
    <polygon points="60,0 120,65 60,130 0,65" fill="#1e293b" stroke="#ef4444" stroke-width="1.8"/>
    <text x="60" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Temporal</text>
    <text x="60" y="73" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Consistency</text>
  </g>

  <!-- 6. SOC Alignment — translate(130, 280) -->
  <g class="node" transform="translate(130, 280)">
    <polygon points="60,0 120,65 60,130 0,65" fill="#1e293b" stroke="#ef4444" stroke-width="1.8"/>
    <text x="60" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">SOC</text>
    <text x="60" y="73" text-anchor="middle" font-size="10" font-weight="600" fill="#f1f5f9">Alignment</text>
  </g>

  <!-- ══════════════════════════════════ -->
  <!-- STEP INDICATORS                    -->
  <!-- ══════════════════════════════════ -->
  <g font-size="9" font-weight="600" fill="#ef4444" opacity="0.5">
    <text x="190" y="87" text-anchor="middle">1</text>
    <text x="400" y="87" text-anchor="middle">2</text>
    <text x="610" y="87" text-anchor="middle">3</text>
    <text x="610" y="277" text-anchor="middle">4</text>
    <text x="400" y="277" text-anchor="middle">5</text>
    <text x="190" y="277" text-anchor="middle">6</text>
  </g>

  <!-- Footer -->
  <text x="450" y="475" text-anchor="middle" font-size="11" fill="#475569">
    6 gate nodes (diamonds) &middot; Sequential fail-fast chain &middot; All must pass before Core loading
  </text>
</svg>

<div class="legend">
  <div class="legend-item">
    <svg width="20" height="20"><polygon points="10,0 20,10 10,20 0,10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/></svg>
    <span>Gate (diamond)</span>
  </div>
  <div class="legend-item">
    <svg width="32" height="10"><line x1="0" y1="5" x2="32" y2="5" stroke="#94a3b8" stroke-width="1.5"/></svg>
    <span>Required</span>
  </div>
  <div class="legend-item">
    <svg width="32" height="10"><line x1="0" y1="5" x2="32" y2="5" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/></svg>
    <span>Conditional</span>
  </div>
  <div class="legend-item">
    <svg width="32" height="10"><line x1="0" y1="5" x2="32" y2="5" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/></svg>
    <span>Blocked path</span>
  </div>
  <div class="legend-item">
    <svg width="32" height="10"><line x1="0" y1="5" x2="32" y2="5" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4"/></svg>
    <span>Ghost (external)</span>
  </div>
</div>

</body>
