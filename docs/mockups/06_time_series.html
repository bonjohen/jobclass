<svg width="860" height="520" viewBox="0 0 860 520">

    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#94a3b8"/>

    <marker id="arrow-cond" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">

    <marker id="arrow-derived" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">

    </marker>

  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">

  <!-- Ghost incoming from Core -->
  <text x="25" y="55" font-size="10" fill="#475569" font-style="italic">&larr; from Core</text>
  <line x1="20" y1="120" x2="130" y2="120" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>

  <line x1="20" y1="200" x2="130" y2="200" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>

  <line x1="20" y1="310" x2="130" y2="310" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>

  <!-- INTERNAL EDGES                     -->
  <!-- ══════════════════════════════════ -->

  <!-- Metrics → Periods -->
  <line x1="300" y1="135" x2="395" y2="135" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Periods → Observations -->
  <line x1="540" y1="150" x2="540" y2="185" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Observations → CPI Deflation (conditional) -->
  <line x1="480" y1="230" x2="380" y2="300" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-cond)"/>

  <text x="428" y="267" text-anchor="middle" font-size="8" fill="#f59e0b">nominal &rarr; real</text>

  <line x1="380" y1="340" x2="520" y2="355" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow-derived)"/>

  <!-- Comparable → Observations (conditional) -->

  <rect x="310" y="370" width="110" height="14" rx="7" fill="#0f172a" stroke="#f59e0b" stroke-width="0.6"/>
  <text x="365" y="381" text-anchor="middle" font-size="8" fill="#f59e0b">comparable history</text>

  <!-- ══════════════════════════════════ -->
  <!-- PROCESS NODES                      -->
  <!-- ══════════════════════════════════ -->

  <!-- Metric Catalog Builder -->
  <g class="node" transform="translate(130, 100)">
    <rect width="170" height="55" rx="8" fill="#1e293b" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="85" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#f1f5f9">Metric Catalog Builder</text>
    <text x="85" y="38" font-size="9" fill="#94a3b8" text-anchor="middle">6 base metrics defined</text>
    <text x="85" y="50" font-size="8" fill="#64748b" text-anchor="middle">populate_dim_metric</text>

  <!-- Time Period Builder -->

    <rect width="170" height="55" rx="8" fill="#1e293b" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="85" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#f1f5f9">Time Period Builder</text>

    <rect width="4" height="55" rx="2" fill="#9c27b0"/>
    <text x="16" y="22" font-size="11" font-weight="700" fill="#f1f5f9">Multi-Vintage OEWS Loading</text>
    <text x="16" y="38" font-size="9" fill="#94a3b8">fact_time_series_observation</text>
    <text x="16" y="50" font-size="8" fill="#64748b">comparable + as-published modes</text>
  </g>

  <!-- CPI Deflation -->
  <g class="node" transform="translate(190, 290)">
    <rect width="190" height="55" rx="8" fill="#1e293b" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="95" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#f1f5f9">CPI Deflation</text>
    <text x="95" y="38" font-size="9" fill="#94a3b8" text-anchor="middle">real = nominal &times; (CPI&#x2082;&#x2080;&#x2082;&#x2083; / CPI&#x2093;)</text>
    <text x="95" y="50" font-size="8" fill="#64748b" text-anchor="middle">CPI_BASE_YEAR = 2023</text>
  </g>

  <!-- Derived Series Computation -->
  <g class="node" transform="translate(510, 330)">
    <rect width="200" height="55" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <rect width="4" height="55" rx="2" fill="#3b82f6"/>

    <text x="16" y="38" font-size="9" fill="#94a3b8">YoY changes, percent changes</text>
    <text x="16" y="50" font-size="8" fill="#64748b">fact_derived_series</text>
  </g>

  <!-- Comparable History Logic -->
  <g class="node" transform="translate(130, 390)">
    <rect width="190" height="55" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="95" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Comparable History Logic</text>
    <text x="95" y="38" font-size="9" fill="#64748b" text-anchor="middle">SOC crosswalk: 1:1 for wages</text>
    <text x="95" y="50" font-size="8" fill="#64748b" text-anchor="middle">splits/merges for employment</text>
  </g>

  <text x="430" y="500" text-anchor="middle" font-size="11" fill="#475569">
    6 process nodes &middot; 6 internal edges &middot; CPI deflation and crosswalk are conditional paths
  </text>
