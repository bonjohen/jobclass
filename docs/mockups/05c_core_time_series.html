<svg width="900" height="600" viewBox="0 0 900 600">

    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">

    <marker id="arrow-derived" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-ghost" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#475569"/>
    </marker>
  </defs>

  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>

  <rect width="900" height="600" fill="url(#grid)" rx="12"/>

  <!-- Lane background -->

  <!-- Ghost incoming: from Dimensions (left, top) -->
  <text x="20" y="50" font-size="10" fill="#475569" font-style="italic">&larr; from Dims &amp; Facts</text>
  <!-- dim_occupation ghost box -->
  <g transform="translate(10, 80)">
    <rect width="100" height="40" rx="6" fill="#1e293b" stroke="#1976d2" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="50" y="16" text-anchor="middle" font-size="8" fill="#1976d2">dim_occupation</text>
    <text x="50" y="30" text-anchor="middle" font-size="7" fill="#64748b">soc_code keys</text>
  </g>
  <line x1="110" y1="100" x2="170" y2="120" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>

  <!-- fact_wages ghost box -->
  <g transform="translate(10, 180)">
    <rect width="100" height="40" rx="6" fill="#1e293b" stroke="#42a5f5" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="50" y="16" text-anchor="middle" font-size="8" fill="#42a5f5">fact_wages</text>
    <text x="50" y="30" text-anchor="middle" font-size="7" fill="#64748b">3 OEWS vintages</text>

  <line x1="110" y1="200" x2="215" y2="260" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>

  <!-- CPI ghost box -->

    <rect width="100" height="40" rx="6" fill="#1e293b" stroke="#1976d2" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="50" y="16" text-anchor="middle" font-size="8" fill="#1976d2">CPI dimensions</text>
    <text x="50" y="30" text-anchor="middle" font-size="7" fill="#64748b">index values</text>
  </g>
  <line x1="110" y1="340" x2="170" y2="370" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>

  <!-- Crosswalk ghost box -->

    <rect width="100" height="40" rx="6" fill="#1e293b" stroke="#1976d2" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="50" y="16" text-anchor="middle" font-size="8" fill="#1976d2">SOC crosswalk</text>
    <text x="50" y="30" text-anchor="middle" font-size="7" fill="#64748b">2010 &harr; 2018</text>
  </g>
  <line x1="110" y1="450" x2="170" y2="475" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>

  <text x="880" y="362" text-anchor="end" font-size="8" fill="#475569">trend, geo_gap, rank</text>

  <!-- INTERNAL EDGES                         -->
  <!-- ══════════════════════════════════════ -->

  <line x1="580" y1="155" x2="445" y2="255" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="315" y="318" width="80" height="14" rx="7" fill="#0f172a" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="355" y="329" text-anchor="middle" font-size="8" fill="#f59e0b">nominal &rarr; real</text>

  <!-- OEWS Loading → Derived (derived) -->
  <line x1="470" y1="300" x2="620" y2="455" stroke="#3b82f6" stroke-width="1.3" stroke-dasharray="2,3" marker-end="url(#arrow-derived)"/>

  <text x="490" y="406" text-anchor="middle" font-size="8" fill="#f59e0b">comparable history</text>

  <!-- PROCESS NODES                          -->
  <!-- ══════════════════════════════════════ -->

  <!-- Metric Catalog Builder -->
  <g class="node" transform="translate(175, 95)">
    <rect width="195" height="60" rx="8" fill="#1e293b" stroke="#9c27b0" stroke-width="1.5"/>

    <text x="97" y="52" font-size="8" fill="#64748b" text-anchor="middle">populate_dim_metric</text>
  </g>

  <!-- Time Period Builder -->
  <g class="node" transform="translate(465, 95)">
    <rect width="195" height="60" rx="8" fill="#1e293b" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="97" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#f1f5f9">Time Period Builder</text>
    <text x="97" y="38" font-size="9" fill="#94a3b8" text-anchor="middle">Annual period dimension</text>
    <text x="97" y="52" font-size="8" fill="#64748b" text-anchor="middle">populate_dim_time_period</text>
  </g>

  <!-- Multi-Vintage OEWS Loading (primary) -->
  <g class="node" transform="translate(220, 245)">
    <rect width="290" height="60" rx="8" fill="#1e293b" stroke="#9c27b0" stroke-width="2.2"/>
    <rect width="5" height="60" rx="2" fill="#9c27b0"/>

    <text x="20" y="40" font-size="10" fill="#94a3b8">fact_time_series_observation</text>
    <text x="20" y="54" font-size="8" fill="#64748b">2021, 2022, 2023 vintages &middot; comparable + as-published</text>
    <rect x="200" y="7" width="75" height="18" rx="9" fill="#9c27b020" stroke="#9c27b050" stroke-width="0.5"/>
    <text x="237" y="20" text-anchor="middle" font-size="9" fill="#9c27b0">primary</text>
  </g>

  <!-- CPI Deflation -->
  <g class="node" transform="translate(175, 355)">
    <rect width="195" height="60" rx="8" fill="#1e293b" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="97" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#f1f5f9">CPI Deflation</text>
    <text x="97" y="38" font-size="9" fill="#94a3b8" text-anchor="middle">real = nominal &times; (CPI&#x2082;&#x2080;&#x2082;&#x2083; / CPI&#x2093;)</text>
    <text x="97" y="52" font-size="8" fill="#64748b" text-anchor="middle">CPI_BASE_YEAR = 2023</text>
  </g>

  <!-- Derived Series Computation -->
  <g class="node" transform="translate(620, 445)">
    <rect width="195" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>

    <text x="20" y="20" font-size="12" font-weight="600" fill="#f1f5f9">Derived Series</text>
    <text x="20" y="38" font-size="9" fill="#94a3b8">YoY changes, percent changes</text>
    <text x="20" y="52" font-size="8" fill="#64748b">fact_derived_series</text>
  </g>

  <!-- Comparable History Logic -->
  <g class="node" transform="translate(175, 460)">
    <rect width="195" height="55" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="97" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Comparable History</text>
    <text x="97" y="38" font-size="9" fill="#64748b" text-anchor="middle">SOC crosswalk: 1:1 for wages</text>
    <text x="97" y="50" font-size="8" fill="#64748b" text-anchor="middle">splits/merges for employment</text>
  </g>

  <!-- Footer -->
  <text x="450" y="585" text-anchor="middle" font-size="11" fill="#475569">
    6 process nodes &middot; Enriches conformed storage into multi-vintage, inflation-adjusted, derived time-series
  </text>
