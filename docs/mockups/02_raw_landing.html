<h1>Raw Landing — Drill-In View</h1>

<svg width="700" height="620" viewBox="0 0 700 620">
  <defs>

  <rect width="700" height="620" fill="url(#grid)" rx="12"/>

  <text x="350" y="63" text-anchor="middle" font-size="12" font-weight="600" fill="#e91e63" opacity="0.7">Raw Landing — Immutable Storage</text>

  <!-- Ghost incoming arrows from Data Sources -->
  <!-- Cylinders: 300w × 60h at translate(200, Y). Left edge x=200, center y = Y+30 -->
  <text x="30" y="55" font-size="10" fill="#475569" font-style="italic">&larr; from Download Mgr</text>
  <line x1="30" y1="112" x2="200" y2="112" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>
  <line x1="30" y1="192" x2="200" y2="192" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>

  <line x1="30" y1="432" x2="200" y2="432" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>
  <line x1="30" y1="512" x2="200" y2="512" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>

  <!-- Ghost outgoing arrows to Stage & Parse -->
  <!-- Cylinder right edge x=500, center y = translate_Y + 30 -->
  <text x="670" y="55" text-anchor="end" font-size="10" fill="#475569" font-style="italic">to Parsers &rarr;</text>
  <line x1="500" y1="112" x2="670" y2="112" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>
  <line x1="500" y1="192" x2="670" y2="192" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>
  <line x1="500" y1="272" x2="670" y2="272" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>
  <line x1="500" y1="352" x2="670" y2="352" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>
  <line x1="500" y1="432" x2="670" y2="410" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>
  <line x1="500" y1="432" x2="670" y2="440" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>
  <line x1="500" y1="512" x2="670" y2="512" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrow-ghost)"/>

  <!-- ══════════════════════════════════ -->
  <!-- STORAGE NODES (cylinders)          -->
  <!-- ══════════════════════════════════ -->

  <!-- Raw SOC Files -->
  <g class="node" transform="translate(200, 82)">
    <path d="M 0,12 Q 0,0 150,0 Q 300,0 300,12 L 300,48 Q 300,60 150,60 Q 0,60 0,48 Z" fill="#1e293b" stroke="#e91e63" stroke-width="1.5"/>
    <ellipse cx="150" cy="12" rx="150" ry="12" fill="#1e293b" stroke="#e91e63" stroke-width="1.5"/>
    <text x="150" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#f1f5f9">Raw SOC Files</text>
    <text x="150" y="48" text-anchor="middle" font-size="9" fill="#94a3b8">raw/soc/{dataset}/{release}/{run}/</text>
  </g>

  <!-- Raw OEWS Files -->
  <g class="node" transform="translate(200, 162)">
    <path d="M 0,12 Q 0,0 150,0 Q 300,0 300,12 L 300,48 Q 300,60 150,60 Q 0,60 0,48 Z" fill="#1e293b" stroke="#e91e63" stroke-width="1.5"/>

  </g>

  <!-- Raw O*NET Files -->
  <g class="node" transform="translate(200, 242)">
    <path d="M 0,12 Q 0,0 150,0 Q 300,0 300,12 L 300,48 Q 300,60 150,60 Q 0,60 0,48 Z" fill="#1e293b" stroke="#e91e63" stroke-width="1.5"/>
    <ellipse cx="150" cy="12" rx="150" ry="12" fill="#1e293b" stroke="#e91e63" stroke-width="1.5"/>
    <text x="150" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#f1f5f9">Raw O*NET Files</text>
    <text x="150" y="48" text-anchor="middle" font-size="9" fill="#94a3b8">raw/onet/{dataset}/{release}/{run}/</text>
  </g>

  <!-- Raw Projections Files -->
  <g class="node" transform="translate(200, 322)">
    <path d="M 0,12 Q 0,0 150,0 Q 300,0 300,12 L 300,48 Q 300,60 150,60 Q 0,60 0,48 Z" fill="#1e293b" stroke="#e91e63" stroke-width="1.5"/>
    <ellipse cx="150" cy="12" rx="150" ry="12" fill="#1e293b" stroke="#e91e63" stroke-width="1.5"/>
    <text x="150" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#f1f5f9">Raw Projections Files</text>
    <text x="150" y="48" text-anchor="middle" font-size="9" fill="#94a3b8">raw/bls/employment_proj/{release}/{run}/</text>
  </g>

  <!-- Raw CPI Files -->
  <g class="node" transform="translate(200, 402)">
    <path d="M 0,12 Q 0,0 150,0 Q 300,0 300,12 L 300,48 Q 300,60 150,60 Q 0,60 0,48 Z" fill="#1e293b" stroke="#e91e63" stroke-width="1.5"/>
    <ellipse cx="150" cy="12" rx="150" ry="12" fill="#1e293b" stroke="#e91e63" stroke-width="1.5"/>

  </g>

  <!-- Raw Crosswalk Files -->
  <g class="node" transform="translate(200, 482)">
    <path d="M 0,12 Q 0,0 150,0 Q 300,0 300,12 L 300,48 Q 300,60 150,60 Q 0,60 0,48 Z" fill="#1e293b" stroke="#e91e63" stroke-width="1.5"/>
    <ellipse cx="150" cy="12" rx="150" ry="12" fill="#1e293b" stroke="#e91e63" stroke-width="1.5"/>
    <text x="150" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#f1f5f9">Raw Crosswalk Files</text>
    <text x="150" y="48" text-anchor="middle" font-size="9" fill="#94a3b8">raw/soc/crosswalk/{release}/{run}/</text>
  </g>

  <text x="350" y="600" text-anchor="middle" font-size="11" fill="#475569">
    6 storage nodes (cylinders) &middot; No internal edges &middot; Immutable — never overwritten
  </text>
</svg>
