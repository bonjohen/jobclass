  <line x1="280" y1="185" x2="470" y2="257" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  </g>

  <!-- Run Manifest -->
  <g class="node" transform="translate(470, 360)">
    <rect width="170" height="50" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="85" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#f1f5f9">Run Manifest</text>
    <text x="85" y="38" text-anchor="middle" font-size="9" fill="#94a3b8">Run ID, timestamps, checksums</text>

  <g class="node" transform="translate(470, 430)">
