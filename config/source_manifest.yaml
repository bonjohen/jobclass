# Source Manifest — Declarative extraction configuration for Release 1
# Each entry defines a downloadable source artifact for the pipeline.

sources:
  # --- SOC (Standard Occupational Classification) ---
  # Both parsers use the definitions file (has SOC Group, Code, Title, Definition).
  # BLS moved SOC files from CSV to XLSX; the definitions XLSX is the superset.
  - source_name: soc
    dataset_name: soc_hierarchy
    dataset_url: https://www.bls.gov/soc/2018/soc_2018_definitions.xlsx
    expected_format: xlsx
    parser_name: soc_hierarchy_parser
    refresh_cadence: on_revision
    version_detection_rule: content_header
    enabled: true

  - source_name: soc
    dataset_name: soc_definitions
    dataset_url: https://www.bls.gov/soc/2018/soc_2018_definitions.xlsx
    expected_format: xlsx
    parser_name: soc_definitions_parser
    refresh_cadence: on_revision
    version_detection_rule: content_header
    enabled: true

  # --- OEWS (Occupational Employment and Wage Statistics) ---
  # Multi-vintage: 2021, 2022, 2023 for time-series analysis.
  # Each vintage is a pair of national + state files.

  - source_name: bls
    dataset_name: oews_national_2021
    dataset_url: https://www.bls.gov/oes/special-requests/oesm21nat.zip
    expected_format: xlsx_in_zip
    parser_name: oews_national_parser
    refresh_cadence: annual
    version_detection_rule: url_pattern
    enabled: true

  - source_name: bls
    dataset_name: oews_state_2021
    dataset_url: https://www.bls.gov/oes/special-requests/oesm21st.zip
    expected_format: xlsx_in_zip
    parser_name: oews_state_parser
    refresh_cadence: annual
    version_detection_rule: url_pattern
    enabled: true

  - source_name: bls
    dataset_name: oews_national_2022
    dataset_url: https://www.bls.gov/oes/special-requests/oesm22nat.zip
    expected_format: xlsx_in_zip
    parser_name: oews_national_parser
    refresh_cadence: annual
    version_detection_rule: url_pattern
    enabled: true

  - source_name: bls
    dataset_name: oews_state_2022
    dataset_url: https://www.bls.gov/oes/special-requests/oesm22st.zip
    expected_format: xlsx_in_zip
    parser_name: oews_state_parser
    refresh_cadence: annual
    version_detection_rule: url_pattern
    enabled: true

  - source_name: bls
    dataset_name: oews_national_2023
    dataset_url: https://www.bls.gov/oes/special-requests/oesm23nat.zip
    expected_format: xlsx_in_zip
    parser_name: oews_national_parser
    refresh_cadence: annual
    version_detection_rule: url_pattern
    enabled: true

  - source_name: bls
    dataset_name: oews_state_2023
    dataset_url: https://www.bls.gov/oes/special-requests/oesm23st.zip
    expected_format: xlsx_in_zip
    parser_name: oews_state_parser
    refresh_cadence: annual
    version_detection_rule: url_pattern
