services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./warehouse.duckdb:/app/warehouse.duckdb:ro
    environment:
      - JOBCLASS_DB_PATH=/app/warehouse.duckdb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
